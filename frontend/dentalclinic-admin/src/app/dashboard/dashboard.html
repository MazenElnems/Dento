<div class="admin-layout-container">
  
  <!-- Sidebar Panel -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="assets/images/logo-highquality-removebg-preview.png" alt="Dento Logo" class="sidebar-logo" />
      <span class="sidebar-badge">OS</span>
    </div>

    <!-- Active User Card -->
    <div class="sidebar-user-card">
      <div class="user-avatar">
        <i class="bi bi-person-workspace"></i>
      </div>
      <div class="user-details">
        <h4>{{ authService.currentUser()?.name }}</h4>
        <span class="user-role">{{ authService.currentUser()?.role?.toUpperCase() }}</span>
      </div>
    </div>

    <!-- Navigation Menu (Contextual indicator) -->
    <nav class="sidebar-menu">
      <div class="menu-label">Workspace</div>
      <a class="menu-item active">
        <i class="bi bi-speedometer2"></i> Dashboard Panel
      </a>
      <a class="menu-item disabled">
        <i class="bi bi-chat-left-text"></i> Messages
      </a>
      <a class="menu-item disabled">
        <i class="bi bi-gear"></i> Settings
      </a>
    </nav>

    <!-- Sidebar Footer Actions -->
    <div class="sidebar-footer">
      <button class="btn-logout" (click)="logout()">
        <i class="bi bi-box-arrow-left"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main Portal Viewport -->
  <main class="main-content">
    @if (authService.currentUser()) {
      @switch (authService.currentUser()?.role) {
        @case ('dentist') {
          <app-dentist-dashboard></app-dentist-dashboard>
        }
        @case ('receptionist') {
          <app-receptionist-dashboard></app-receptionist-dashboard>
        }
        @case ('admin') {
          <app-admin-dashboard></app-admin-dashboard>
        }
      }
    }
  </main>

</div>
